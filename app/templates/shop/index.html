{% extends 'base.html' %}

{% block content %}
<span class="title">
    <h1>{% block title %} The Shop Page {% endblock %}</h1>
</span>
<div class="content">
    <h2>This is the shop Flask blueprint</h2>
</div>
<p>
    {% for item in items %}
    <a href="/shop/item/{{ item.id }}">{{ item.name }}</a><br>
    {% endfor %}
</p>
{% endblock %}
